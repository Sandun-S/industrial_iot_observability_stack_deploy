[server]
# Serve Grafana on port 3000
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = admin
admin_password = admin
allow_embedding = true

[auth.anonymous]
# Allow anonymous dashboard viewing (no login required to view)
enabled = true
org_role = Viewer

[auth.basic]
enabled = true

[users]
allow_sign_up = false

[dashboards]
# Enable dashboard JSON files for provisioning
versions_to_keep = 20

[panels]
disable_sanitize_html = false
