# Grafana Provisioning — Dashboard Provider
# Auto-loads dashboards from the dashboards directory on startup.
apiVersion: 1

providers:
  - name: IIoT
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
